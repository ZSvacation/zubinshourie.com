<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ORBITAL HOP — SPACE ARCADE</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0D0B08;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Space Mono', monospace;
  overflow: hidden;
  touch-action: none;
}

#wrap {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

canvas {
  display: block;
  image-rendering: pixelated;
}

/* CRT scanline overlay over the canvas */
#crt {
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 10;
}

#ui-row {
  display: flex;
  gap: 12px;
  align-items: center;
}

.ui-pill {
  background: rgba(13,11,8,0.9);
  border: 1px solid rgba(245,240,232,0.12);
  padding: 5px 14px;
  font-size: 10px;
  letter-spacing: 0.18em;
  color: #F5F0E8;
}
.ui-pill span {
  color: #E8971A;
  font-weight: 700;
}

#dpad {
  display: grid;
  grid-template-columns: repeat(3, 50px);
  grid-template-rows: repeat(2, 50px);
  gap: 5px;
}

.dbtn {
  width: 50px; height: 50px;
  background: rgba(245,240,232,0.07);
  border: 1px solid rgba(245,240,232,0.18);
  color: #F5F0E8;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.08s, transform 0.08s;
}
.dbtn:active { background: rgba(245,240,232,0.18); transform: scale(0.93); }

#up-btn   { grid-column: 2; grid-row: 1; }
#left-btn { grid-column: 1; grid-row: 2; }
#dn-btn   { grid-column: 2; grid-row: 2; }
#rt-btn   { grid-column: 3; grid-row: 2; }

#back-link {
  position: absolute;
  top: -36px; left: 0;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: rgba(245,240,232,0.35);
  text-decoration: none;
  transition: color 0.2s;
}
#back-link:hover { color: #E8971A; }
</style>
</head>
<body>
<div id="wrap">
  <a id="back-link" href="index.html">← BACK TO BASE</a>
  <div id="ui-row">
    <div class="ui-pill">DIST <span id="score-val">0</span></div>
    <div class="ui-pill">BEST <span id="best-val">0</span></div>
  </div>
  <canvas id="game"></canvas>
  <canvas id="crt"></canvas>
  <div id="dpad">
    <button class="dbtn" id="up-btn">▲</button>
    <button class="dbtn" id="left-btn">◀</button>
    <button class="dbtn" id="dn-btn">▼</button>
    <button class="dbtn" id="rt-btn">▶</button>
  </div>
</div>

<script>
// ─── CONSTANTS ──────────────────────────────────────────────
const COLS    = 9;
const CELL    = 54;
const W       = COLS * CELL;   // 486
const H       = 594;           // 11 rows visible
const ROWS_VISIBLE = Math.ceil(H / CELL) + 2;
// Player rests at this screen Y (3 rows from bottom)
const PLAYER_BASE_Y = H - 3 * CELL - CELL / 2;

// Palette
const C_BG     = '#0D0B08';
const C_CREAM  = '#F5F0E8';
const C_CORAL  = '#D94F2B';
const C_AMBER  = '#E8971A';
const C_TEAL   = '#2A8A7E';
const C_PURPLE = '#5C3F7A';

// ─── CANVAS SETUP ───────────────────────────────────────────
const game = document.getElementById('game');
const ctx  = game.getContext('2d');
game.width  = W;
game.height = H;

// CRT canvas overlay (same size)
const crtC = document.getElementById('crt');
const crtCtx = crtC.getContext('2d');
crtC.width  = W;
crtC.height = H;
crtC.style.width  = W + 'px';
crtC.style.height = H + 'px';
// Draw static CRT once
(function drawCRT() {
  // Scanlines
  for (let y = 0; y < H; y += 2) {
    crtCtx.fillStyle = 'rgba(0,0,0,0.18)';
    crtCtx.fillRect(0, y, W, 1);
  }
  // Vignette
  const vig = crtCtx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.75);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.55)');
  crtCtx.fillStyle = vig;
  crtCtx.fillRect(0, 0, W, H);
})();

// ─── GAME STATE ─────────────────────────────────────────────
let STATE = 'start'; // 'start' | 'playing' | 'dead'
let score = 0, hiScore = 0;
let lanes  = {};
let player = null;
let stars  = [];
let shakeAmt  = 0;
let deadAlpha = 0;
let lastTS    = 0;
let particles = [];

// ─── STARS ──────────────────────────────────────────────────
function initStars() {
  stars = [];
  for (let i = 0; i < 110; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.3 + 0.2,
      phase: Math.random() * Math.PI * 2,
      col: Math.random() < 0.07 ? C_AMBER
         : Math.random() < 0.10 ? C_TEAL : C_CREAM,
    });
  }
}

// ─── LANE GENERATION ────────────────────────────────────────
function getLane(row) {
  const r = Math.max(0, row);
  if (!lanes[r]) lanes[r] = genLane(r);
  return lanes[r];
}

function makeAsteroidPts(r) {
  const pts = [];
  const N = 8 + Math.floor(Math.random() * 3);
  for (let i = 0; i < N; i++) {
    const a = (i / N) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
    const d = r * (0.60 + Math.random() * 0.38);
    pts.push([Math.cos(a) * d, Math.sin(a) * d * 0.78]);
  }
  return pts;
}

function genLane(row) {
  if (row === 0) return { type: 'safe', bg: '#0A1A0F', obs: [] };

  const diff  = Math.min(1.0, row / 45);
  const rand  = Math.random();

  // Guaranteed safe every 5 rows
  if (row % 5 === 0) return { type: 'safe', bg: '#0A1A0F', obs: [] };

  if (rand < 0.26 - diff * 0.06) return { type: 'safe', bg: '#0A1A0F', obs: [] };
  if (rand < 0.58) return genAsteroidLane(diff);
  if (rand < 0.79) return genMeteorLane(diff);
  return genDebrisLane(diff);
}

function genAsteroidLane(diff) {
  const dir  = Math.random() < 0.5 ? 1 : -1;
  const spd  = (42 + diff * 75 + Math.random() * 30) * dir;
  const cnt  = 2 + Math.round(diff * 2.5 + Math.random() * 1.5);
  const obs  = [];
  for (let i = 0; i < cnt; i++) {
    const w  = 32 + Math.random() * 20;
    obs.push({ x: Math.random() * W, w, spd, t: 'ast',
               pts: makeAsteroidPts(w / 2) });
  }
  return { type: 'asteroid', bg: '#120D08', obs };
}

function genMeteorLane(diff) {
  const dir  = Math.random() < 0.5 ? 1 : -1;
  const spd  = (100 + diff * 140 + Math.random() * 40) * dir;
  const cnt  = 1 + Math.round(diff * 2 + Math.random() * 1.5);
  const obs  = [];
  for (let i = 0; i < cnt; i++) {
    obs.push({ x: Math.random() * W, w: 28 + Math.random() * 14, spd, t: 'met' });
  }
  return { type: 'meteor', bg: '#0E0A06', obs };
}

function genDebrisLane(diff) {
  const dir  = Math.random() < 0.5 ? 1 : -1;
  const spd  = (28 + diff * 55 + Math.random() * 25) * dir;
  const cnt  = 2 + Math.round(diff * 2 + Math.random() * 1.5);
  const obs  = [];
  for (let i = 0; i < cnt; i++) {
    obs.push({ x: Math.random() * W, w: 30 + Math.random() * 22, spd, t: 'deb',
               seed: Math.random() });
  }
  return { type: 'debris', bg: '#060C10', obs };
}

// ─── PLAYER ─────────────────────────────────────────────────
function initPlayer() {
  player = {
    col: Math.floor(COLS / 2),
    row: 0,
    alive:    true,
    deathT:   0,
    // Hop animation
    hopping:  false,
    hopT:     1.0,
    fromCol:  Math.floor(COLS / 2),
    fromRow:  0,
  };
}

function easeIO(t) {
  return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
}

function playerVisualPos() {
  if (!player.hopping) {
    return { x: player.col * CELL + CELL / 2, y: PLAYER_BASE_Y };
  }
  const e   = easeIO(Math.min(player.hopT, 1));
  const arc = Math.sin(player.hopT * Math.PI) * CELL * 0.48;
  const x   = (player.fromCol + (player.col - player.fromCol) * e) * CELL + CELL / 2;
  return { x, y: PLAYER_BASE_Y - arc };
}

// Camera row: follows player.row with hop easing so lanes scroll with the hop
function camRow() {
  if (!player) return 0;
  if (!player.hopping) return player.row;
  const e = easeIO(Math.min(player.hopT, 1));
  return player.fromRow + (player.row - player.fromRow) * e;
}

function rowToScreenY(worldRow) {
  // Player row (camRow) → PLAYER_BASE_Y; rows above → less canvas Y
  return PLAYER_BASE_Y + (camRow() - worldRow) * CELL;
}

// ─── MOVEMENT ───────────────────────────────────────────────
function doHop(dc, dr) {
  if (!player || !player.alive || STATE !== 'playing') return;
  if (player.hopping && player.hopT < 0.55) return; // debounce mid-hop
  const nc = player.col + dc;
  const nr = player.row + dr;
  if (nc < 0 || nc >= COLS) return;
  if (nr < 0) return;

  player.fromCol = player.col;
  player.fromRow = player.row;
  player.col     = nc;
  player.row     = nr;
  player.hopping = true;
  player.hopT    = 0;

  if (player.row > score) {
    score = player.row;
    if (score > hiScore) hiScore = score;
    document.getElementById('score-val').textContent = score;
    document.getElementById('best-val').textContent  = hiScore;
  }

  // Pre-generate lanes ahead
  for (let r = player.row - 2; r <= player.row + 14; r++) {
    if (r >= 0) getLane(r);
  }
}

// ─── COLLISION ──────────────────────────────────────────────
function checkCollision() {
  if (!player || !player.alive) return;
  // Only check at rest or near hop completion
  if (player.hopping && player.hopT < 0.85) return;

  const lane = getLane(player.row);
  if (lane.type === 'safe') return;

  const px = player.col * CELL + CELL / 2;
  const margin = 9;

  for (const o of lane.obs) {
    const ox = ((o.x % W) + W) % W;
    const ow = o.w;
    const pL = px - margin, pR = px + margin;
    let hit;
    if (ox + ow <= W) {
      hit = pR > ox && pL < ox + ow;
    } else {
      // Wraps: [ox, W] ∪ [0, ox+ow-W]
      hit = pR > ox || pL < ox + ow - W;
    }
    if (hit) { killPlayer(); return; }
  }
}

function killPlayer() {
  if (!player.alive) return;
  player.alive = false;
  shakeAmt = 14;
  STATE    = 'dead';
  deadAlpha = 0;
  // Spawn death particles
  const px = player.col * CELL + CELL / 2;
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = 60 + Math.random() * 120;
    particles.push({
      x: px, y: PLAYER_BASE_Y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1.0,
      col: [C_CORAL, C_AMBER, C_CREAM][Math.floor(Math.random() * 3)],
      r: 2 + Math.random() * 4,
    });
  }
}

// ─── UPDATE ─────────────────────────────────────────────────
function update(dt) {
  // Move obstacles
  const topR = player.row + Math.ceil((H - PLAYER_BASE_Y) / CELL) + 3;
  const botR = player.row - Math.ceil(PLAYER_BASE_Y / CELL) - 3;
  for (let r = botR; r <= topR; r++) {
    const lane = lanes[Math.max(0, r)];
    if (!lane) continue;
    for (const o of lane.obs) {
      o.x = ((o.x + o.spd * dt) % W + W) % W;
    }
  }

  // Hop progress
  if (player.hopping) {
    player.hopT = Math.min(1.0, player.hopT + dt * 9);
    if (player.hopT >= 1.0) player.hopping = false;
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x    += p.vx * dt;
    p.y    += p.vy * dt;
    p.vy   += 60 * dt; // slight gravity
    p.life -= dt * 2.2;
    if (p.life <= 0) particles.splice(i, 1);
  }

  checkCollision();
  shakeAmt *= 0.78;

  if (STATE === 'dead') {
    deadAlpha = Math.min(1, deadAlpha + dt * 1.4);
  }
}

// ─── DRAW ────────────────────────────────────────────────────
function draw(ts) {
  ctx.save();
  if (shakeAmt > 0.5) {
    ctx.translate(
      (Math.random() - 0.5) * shakeAmt * 2,
      (Math.random() - 0.5) * shakeAmt * 2
    );
  }

  // Background
  ctx.fillStyle = C_BG;
  ctx.fillRect(0, 0, W, H);

  // Stars
  drawStars(ts);

  if (STATE !== 'start') {
    drawLanes();
    drawParticles();
    if (player) drawPlayer(ts);
  }

  ctx.restore();

  // Overlays (no shake)
  if (STATE === 'start') drawStartScreen();
  if (STATE === 'dead')  drawDeadScreen();
}

function drawStars(ts) {
  for (const s of stars) {
    const a = 0.4 + 0.6 * Math.sin(ts / 900 + s.phase);
    ctx.globalAlpha = a;
    ctx.fillStyle   = s.col;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawLanes() {
  const topR = player.row + Math.ceil((H - PLAYER_BASE_Y) / CELL) + 2;
  const botR = player.row - Math.ceil(PLAYER_BASE_Y / CELL) - 2;

  for (let r = botR; r <= topR; r++) {
    const worldRow = Math.max(0, r);
    const lane = getLane(worldRow);
    const sy   = rowToScreenY(worldRow);
    if (sy > H + CELL || sy < -CELL) continue;

    // Lane background strip
    ctx.fillStyle   = lane.bg;
    ctx.globalAlpha = 0.55;
    ctx.fillRect(0, sy - CELL / 2, W, CELL);
    ctx.globalAlpha = 1;

    // Row divider
    ctx.strokeStyle = 'rgba(245,240,232,0.04)';
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.moveTo(0, sy - CELL / 2);
    ctx.lineTo(W, sy - CELL / 2);
    ctx.stroke();

    // Lane type indicator (left edge)
    const typeColors = { asteroid: '#6B4E32', meteor: C_CORAL, debris: C_TEAL, safe: '#27AE60' };
    ctx.fillStyle   = typeColors[lane.type] || '#555';
    ctx.globalAlpha = 0.5;
    ctx.fillRect(0, sy - CELL / 2 + 1, 3, CELL - 2);
    ctx.globalAlpha = 1;

    // Draw obstacles
    for (const o of lane.obs) drawObstacle(o, sy);
  }
}

function drawObstacle(o, sy) {
  const ox = ((o.x % W) + W) % W;
  renderObs(o, ox, sy);
  // Wrap copy
  if (ox + o.w > W)  renderObs(o, ox - W, sy);
  if (ox < 4)        renderObs(o, ox + W, sy);
}

function renderObs(o, ox, sy) {
  ctx.save();
  ctx.translate(ox + o.w / 2, sy);
  if (o.t === 'ast') drawAsteroid(o);
  else if (o.t === 'met') drawMeteor(o);
  else drawDebris(o);
  ctx.restore();
}

function drawAsteroid(o) {
  const r = o.w / 2;
  // Body using pre-baked points
  ctx.fillStyle = '#5A3E22';
  ctx.beginPath();
  for (let i = 0; i < o.pts.length; i++) {
    const [px, py] = o.pts[i];
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
  // Highlight
  ctx.fillStyle   = '#7A5430';
  ctx.globalAlpha = 0.55;
  ctx.beginPath();
  ctx.arc(-r * 0.28, -r * 0.28, r * 0.28, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  // Crater
  ctx.fillStyle = '#3A2210';
  ctx.beginPath();
  ctx.arc(r * 0.18, r * 0.12, r * 0.22, 0, Math.PI * 2);
  ctx.fill();
  // Thin rim
  ctx.strokeStyle = '#8B6238';
  ctx.lineWidth   = 0.8;
  ctx.globalAlpha = 0.4;
  ctx.beginPath();
  for (let i = 0; i < o.pts.length; i++) {
    const [px, py] = o.pts[i];
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawMeteor(o) {
  const r   = o.w / 2;
  const dir = o.spd > 0 ? 1 : -1;
  const tailLen = r * 2.4;

  // Tail gradient
  const grd = ctx.createLinearGradient(-dir * tailLen, 0, dir * r, 0);
  grd.addColorStop(0, 'rgba(232,151,26,0)');
  grd.addColorStop(0.4, 'rgba(217,79,43,0.25)');
  grd.addColorStop(1, 'rgba(217,79,43,0.0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.ellipse(0, 0, tailLen + r, r * 0.28, 0, 0, Math.PI * 2);
  ctx.fill();

  // Core glow
  const glow = ctx.createRadialGradient(dir * r * 0.1, 0, 0, dir * r * 0.1, 0, r * 1.1);
  glow.addColorStop(0, C_AMBER);
  glow.addColorStop(0.5, C_CORAL);
  glow.addColorStop(1, 'rgba(217,79,43,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(dir * r * 0.1, 0, r * 1.1, 0, Math.PI * 2);
  ctx.fill();

  // Bright head
  ctx.fillStyle = '#FFF0D0';
  ctx.beginPath();
  ctx.arc(dir * r * 0.15, 0, r * 0.38, 0, Math.PI * 2);
  ctx.fill();
}

function drawDebris(o) {
  const hw = o.w * 0.42;
  const hh = hw * 0.6;

  // Body
  ctx.fillStyle   = '#1A2A2C';
  ctx.strokeStyle = C_TEAL;
  ctx.lineWidth   = 0.8;
  ctx.fillRect(-hw, -hh, hw * 2, hh * 2);
  ctx.globalAlpha = 0.55;
  ctx.strokeRect(-hw, -hh, hw * 2, hh * 2);
  ctx.globalAlpha = 1;

  // Solar panels
  const panelW = hw * 0.65;
  const panelH = hh * 0.5;
  const panelY = 0;
  ctx.fillStyle   = '#0D1A28';
  ctx.strokeStyle = '#2A8A7E';
  ctx.lineWidth   = 0.6;
  ctx.fillRect(-hw - panelW - 3, panelY - panelH, panelW, panelH * 2);
  ctx.strokeRect(-hw - panelW - 3, panelY - panelH, panelW, panelH * 2);
  ctx.fillRect(hw + 3, panelY - panelH, panelW, panelH * 2);
  ctx.strokeRect(hw + 3, panelY - panelH, panelW, panelH * 2);

  // Panel grid lines
  ctx.globalAlpha = 0.4;
  ctx.strokeStyle = C_TEAL;
  ctx.lineWidth   = 0.4;
  // Left panel center line
  ctx.beginPath();
  ctx.moveTo(-hw - panelW / 2 - 3, panelY - panelH);
  ctx.lineTo(-hw - panelW / 2 - 3, panelY + panelH);
  ctx.stroke();
  // Right panel center line
  ctx.beginPath();
  ctx.moveTo(hw + panelW / 2 + 3, panelY - panelH);
  ctx.lineTo(hw + panelW / 2 + 3, panelY + panelH);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Antenna
  ctx.strokeStyle = '#AACCCC';
  ctx.lineWidth   = 0.7;
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.moveTo(0, -hh);
  ctx.lineTo(0, -hh - 7);
  ctx.moveTo(-2, -hh - 7);
  ctx.lineTo(2, -hh - 7);
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawPlayer(ts) {
  if (!player) return;
  const { x, y } = playerVisualPos();

  // Death flash
  if (!player.alive) {
    const flash = Math.sin(ts / 60) > 0;
    if (!flash) return;
  }

  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.fillStyle   = 'rgba(0,0,0,0.35)';
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.ellipse(0, 20, 14, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Backpack (behind body)
  ctx.fillStyle = C_AMBER;
  ctx.fillRect(7, -8, 6, 14);

  // Suit body
  ctx.fillStyle = '#E8E2D4';
  ctx.beginPath();
  ctx.roundRect(-9, -4, 18, 18, 3);
  ctx.fill();

  // Suit shading
  ctx.fillStyle   = 'rgba(0,0,0,0.12)';
  ctx.beginPath();
  ctx.roundRect(1, -4, 8, 18, [0, 3, 3, 0]);
  ctx.fill();

  // Helmet
  ctx.fillStyle = '#E8E2D4';
  ctx.beginPath();
  ctx.arc(0, -12, 11, 0, Math.PI * 2);
  ctx.fill();

  // Visor
  const visorGrd = ctx.createRadialGradient(-2, -14, 1, 0, -12, 9);
  visorGrd.addColorStop(0, '#5ABDB4');
  visorGrd.addColorStop(1, '#1A5F59');
  ctx.fillStyle = visorGrd;
  ctx.beginPath();
  ctx.arc(0, -12, 7.5, 0, Math.PI * 2);
  ctx.fill();

  // Visor reflection
  ctx.fillStyle   = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.arc(-2.5, -14.5, 3, 0, Math.PI * 2);
  ctx.fill();

  // Helmet ring
  ctx.strokeStyle = '#CCBFA8';
  ctx.lineWidth   = 1.2;
  ctx.beginPath();
  ctx.arc(0, -12, 11, 0, Math.PI * 2);
  ctx.stroke();

  // Legs
  ctx.fillStyle = '#D4CCBA';
  ctx.beginPath();
  ctx.roundRect(-8, 14, 7, 9, 2);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(1, 14, 7, 9, 2);
  ctx.fill();

  // Boots
  ctx.fillStyle = '#2A8A7E';
  ctx.beginPath();
  ctx.roundRect(-9, 20, 8, 5, 1);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(1, 20, 8, 5, 1);
  ctx.fill();

  // Arms
  ctx.fillStyle = '#D4CCBA';
  ctx.beginPath();
  ctx.roundRect(-16, -3, 7, 11, 2);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(9, -3, 7, 11, 2);
  ctx.fill();

  // Arm gloves
  ctx.fillStyle = '#E8971A';
  ctx.beginPath();
  ctx.roundRect(-16, 5, 7, 4, 1);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(9, 5, 7, 4, 1);
  ctx.fill();

  // Chest badge
  ctx.fillStyle   = C_CORAL;
  ctx.globalAlpha = 0.8;
  ctx.beginPath();
  ctx.arc(-3, 2, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle   = p.col;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─── SCREENS ─────────────────────────────────────────────────
function drawStartScreen() {
  // Dark overlay
  ctx.fillStyle = 'rgba(13,11,8,0.88)';
  ctx.fillRect(0, 0, W, H);

  // Stars still visible through overlay — already drawn

  // Title box
  const bx = 30, by = H * 0.18, bw = W - 60, bh = 230;
  ctx.strokeStyle = 'rgba(245,240,232,0.18)';
  ctx.lineWidth   = 1;
  ctx.strokeRect(bx, by, bw, bh);

  // ORBITAL text
  ctx.fillStyle  = C_AMBER;
  ctx.font       = 'bold 38px "Space Mono"';
  ctx.textAlign  = 'center';
  ctx.letterSpacing = '0.08em';
  ctx.fillText('ORBITAL', W / 2, by + 54);

  ctx.fillStyle = C_CREAM;
  ctx.font      = 'bold 38px "Space Mono"';
  ctx.fillText('HOP', W / 2, by + 96);

  ctx.fillStyle   = 'rgba(245,240,232,0.35)';
  ctx.font        = '9px "Space Mono"';
  ctx.letterSpacing = '0.22em';
  ctx.fillText('S P A C E  A R C A D E', W / 2, by + 124);

  // Divider
  ctx.strokeStyle = 'rgba(245,240,232,0.1)';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.moveTo(bx + 20, by + 142);
  ctx.lineTo(bx + bw - 20, by + 142);
  ctx.stroke();

  // Instructions
  ctx.fillStyle    = 'rgba(245,240,232,0.5)';
  ctx.font         = '10px "Space Mono"';
  ctx.letterSpacing = '0.1em';
  ctx.fillText('ARROW KEYS / WASD', W / 2, by + 168);
  ctx.fillText('OR D-PAD BELOW', W / 2, by + 188);

  ctx.fillStyle    = 'rgba(245,240,232,0.22)';
  ctx.font         = '9px "Space Mono"';
  ctx.letterSpacing = '0.1em';
  ctx.fillText('avoid asteroids  ·  meteors  ·  debris', W / 2, by + 210);

  // Blink prompt
  const blink = Math.floor(Date.now() / 550) % 2;
  if (blink) {
    ctx.fillStyle    = C_TEAL;
    ctx.font         = '11px "Space Mono"';
    ctx.letterSpacing = '0.18em';
    ctx.fillText('[ PRESS ANY KEY ]', W / 2, H * 0.72);
  }
}

function drawDeadScreen() {
  if (deadAlpha <= 0) return;
  ctx.globalAlpha = deadAlpha;

  ctx.fillStyle = 'rgba(13,11,8,0.82)';
  ctx.fillRect(0, 0, W, H);

  const bx = 40, by = H * 0.22, bw = W - 80, bh = 200;
  ctx.strokeStyle = C_CORAL;
  ctx.lineWidth   = 1;
  ctx.globalAlpha = deadAlpha * 0.5;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.globalAlpha = deadAlpha;

  ctx.fillStyle  = C_CORAL;
  ctx.font       = 'bold 28px "Space Mono"';
  ctx.textAlign  = 'center';
  ctx.letterSpacing = '0.06em';
  ctx.fillText('SIGNAL LOST', W / 2, by + 46);

  ctx.fillStyle    = 'rgba(245,240,232,0.35)';
  ctx.font         = '9px "Space Mono"';
  ctx.letterSpacing = '0.2em';
  ctx.fillText('ASTRONAUT DOWN', W / 2, by + 70);

  // Score
  ctx.fillStyle    = C_CREAM;
  ctx.font         = 'bold 22px "Space Mono"';
  ctx.letterSpacing = '0.05em';
  ctx.fillText(`${score}`, W / 2, by + 116);
  ctx.fillStyle    = 'rgba(245,240,232,0.45)';
  ctx.font         = '9px "Space Mono"';
  ctx.letterSpacing = '0.2em';
  ctx.fillText('DISTANCE UNITS', W / 2, by + 136);

  if (score >= hiScore && score > 0) {
    ctx.fillStyle    = C_AMBER;
    ctx.font         = '9px "Space Mono"';
    ctx.letterSpacing = '0.18em';
    ctx.fillText('★  NEW RECORD  ★', W / 2, by + 158);
  }

  // Restart prompt
  const blink = Math.floor(Date.now() / 500) % 2;
  if (blink) {
    ctx.fillStyle    = C_TEAL;
    ctx.font         = '11px "Space Mono"';
    ctx.letterSpacing = '0.16em';
    ctx.fillText('[ R ] RELAUNCH', W / 2, by + 188);
  }

  ctx.globalAlpha = 1;
}

// ─── GAME LOOP ────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - lastTS) / 1000, 0.05);
  lastTS   = ts;

  if (STATE === 'playing') update(dt);
  else if (STATE === 'dead') {
    // Still animate particles + fade
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x    += p.vx * dt;
      p.y    += p.vy * dt;
      p.vy   += 60 * dt;
      p.life -= dt * 2.2;
      if (p.life <= 0) particles.splice(i, 1);
    }
    deadAlpha = Math.min(1, deadAlpha + dt * 1.4);
    shakeAmt *= 0.78;
  }

  draw(ts);
  requestAnimationFrame(loop);
}

function startGame() {
  lanes     = {};
  score     = 0;
  particles = [];
  document.getElementById('score-val').textContent = 0;
  for (let r = 0; r <= 16; r++) getLane(r);
  initPlayer();
  STATE = 'playing';
}

function restartGame() {
  if (STATE === 'dead' && deadAlpha > 0.3) startGame();
}

// ─── INPUT ────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (STATE === 'start') { startGame(); return; }
  if (STATE === 'dead')  { if (e.key === 'r' || e.key === 'R') restartGame(); return; }
  switch (e.key) {
    case 'ArrowUp':    case 'w': case 'W': doHop(0, 1);  e.preventDefault(); break;
    case 'ArrowDown':  case 's': case 'S': doHop(0, -1); e.preventDefault(); break;
    case 'ArrowLeft':  case 'a': case 'A': doHop(-1, 0); e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D': doHop(1, 0);  e.preventDefault(); break;
  }
});

function addBtnListener(id, dc, dr) {
  const btn = document.getElementById(id);
  function act(e) {
    e.preventDefault();
    if (STATE === 'start') { startGame(); return; }
    if (STATE === 'dead')  { restartGame(); return; }
    doHop(dc, dr);
  }
  btn.addEventListener('touchstart', act, { passive: false });
  btn.addEventListener('mousedown', act);
}

addBtnListener('up-btn',   0,  1);
addBtnListener('dn-btn',   0, -1);
addBtnListener('left-btn', -1, 0);
addBtnListener('rt-btn',    1, 0);

// Swipe support on canvas
let swipeX = 0, swipeY = 0;
game.addEventListener('touchstart', e => {
  swipeX = e.touches[0].clientX;
  swipeY = e.touches[0].clientY;
  if (STATE === 'start') { startGame(); return; }
}, { passive: true });
game.addEventListener('touchend', e => {
  if (STATE !== 'playing') { if (STATE === 'dead') restartGame(); return; }
  const dx = e.changedTouches[0].clientX - swipeX;
  const dy = e.changedTouches[0].clientY - swipeY;
  const adx = Math.abs(dx), ady = Math.abs(dy);
  if (Math.max(adx, ady) < 18) { doHop(0, 1); return; } // tap = forward
  if (adx > ady) doHop(dx > 0 ? 1 : -1, 0);
  else           doHop(0, dy < 0 ? 1 : -1); // swipe up = forward
}, { passive: true });

// ─── BOOT ─────────────────────────────────────────────────────
initStars();
initPlayer(); // dummy player for drawing stars on start screen
requestAnimationFrame(ts => { lastTS = ts; requestAnimationFrame(loop); });
</script>
