<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>COSMLE — Daily Space Word</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:    #F4EFE0;
      --coral:    #D94F2B;
      --amber:    #E8971A;
      --teal:     #2A8A7E;
      --charcoal: #1C1A16;
      --bg:       #07060A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Space Mono', monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Starfield ── */
    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── CRT scanlines ── */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.045) 3px,
        rgba(0,0,0,0.045) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ── Vignette ── */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* ── Header ── */
    .header {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 500px;
      padding: 22px 16px 14px;
      text-align: center;
      border-bottom: 1px solid rgba(244,239,224,0.08);
    }

    .header-eyebrow {
      font-size: 8px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--amber);
      opacity: 0.65;
      margin-bottom: 6px;
    }

    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 58px;
      letter-spacing: 0.1em;
      line-height: 1;
      color: var(--cream);
      text-shadow:
        0 0 20px rgba(244,239,224,0.15),
        0 0 60px rgba(244,239,224,0.06);
    }

    .header-title .c-coral {
      color: var(--coral);
      text-shadow: 0 0 18px rgba(217,79,43,0.55), 0 0 40px rgba(217,79,43,0.25);
    }

    .header-title .c-teal {
      color: var(--teal);
      text-shadow: 0 0 18px rgba(42,138,126,0.55), 0 0 40px rgba(42,138,126,0.2);
    }

    .header-sub {
      font-size: 8px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--teal);
      opacity: 0.75;
      margin-top: 5px;
    }

    .header-meta {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-top: 7px;
    }

    .header-meta span {
      font-size: 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(244,239,224,0.28);
    }

    .header-meta span b {
      color: rgba(244,239,224,0.5);
      font-weight: 700;
    }

    /* ── Help icon ── */
    .help-btn {
      position: absolute;
      top: 22px;
      right: 16px;
      width: 28px;
      height: 28px;
      border: 1px solid rgba(244,239,224,0.2);
      border-radius: 50%;
      background: transparent;
      color: rgba(244,239,224,0.45);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s;
    }

    .help-btn:hover { border-color: var(--amber); color: var(--amber); }

    /* ── Game area ── */
    .game {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 22px 16px 16px;
      flex: 1;
      width: 100%;
      max-width: 500px;
    }

    /* ── Grid ── */
    .grid {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .row {
      display: flex;
      gap: 5px;
    }

    .tile {
      width: 58px;
      height: 58px;
      border: 2px solid rgba(244,239,224,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 0.04em;
      color: var(--cream);
      background: transparent;
      user-select: none;
      transition: border-color 0.08s;
      position: relative;
    }

    .tile.filled {
      border-color: rgba(244,239,224,0.38);
      background: rgba(244,239,224,0.04);
      animation: tile-pop 0.08s ease;
    }

    @keyframes tile-pop {
      0%   { transform: scale(0.88); }
      60%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    /* Flip reveal */
    .tile.reveal {
      animation: tile-flip 0.52s ease forwards;
    }

    @keyframes tile-flip {
      0%   { transform: rotateX(0deg);  }
      45%  { transform: rotateX(90deg); }
      55%  { transform: rotateX(90deg); }
      100% { transform: rotateX(0deg);  }
    }

    .tile.correct {
      background: var(--teal);
      border-color: var(--teal);
      box-shadow: 0 0 10px rgba(42,138,126,0.65), 0 0 28px rgba(42,138,126,0.22);
    }

    .tile.present {
      background: var(--amber);
      border-color: var(--amber);
      box-shadow: 0 0 10px rgba(232,151,26,0.65), 0 0 28px rgba(232,151,26,0.22);
      color: #1a1208;
    }

    .tile.absent {
      background: #1B1916;
      border-color: #1B1916;
      color: rgba(244,239,224,0.35);
    }

    /* Row shake */
    .row.shake { animation: shake 0.48s ease; }

    @keyframes shake {
      0%,100% { transform: translateX(0);   }
      15%     { transform: translateX(-7px); }
      30%     { transform: translateX(7px);  }
      45%     { transform: translateX(-5px); }
      60%     { transform: translateX(5px);  }
      75%     { transform: translateX(-3px); }
      90%     { transform: translateX(3px);  }
    }

    /* Win bounce */
    .tile.bounce { animation: tile-bounce 0.55s ease forwards; }

    @keyframes tile-bounce {
      0%,100% { transform: translateY(0);    }
      35%     { transform: translateY(-18px); }
      60%     { transform: translateY(-9px);  }
      80%     { transform: translateY(-4px);  }
    }

    /* ── Keyboard ── */
    .keyboard {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .kb-row {
      display: flex;
      justify-content: center;
      gap: 5px;
    }

    .key {
      height: 52px;
      min-width: 38px;
      padding: 0 6px;
      border: 1px solid rgba(244,239,224,0.06);
      border-radius: 2px;
      background: #211E1A;
      color: var(--cream);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      letter-spacing: 0.04em;
      transition: background 0.12s, box-shadow 0.12s, color 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .key:hover  { background: #2E2B25; }
    .key:active { transform: scale(0.94); }
    .key.wide   { min-width: 62px; font-size: 10px; }

    .key.correct {
      background: var(--teal);
      border-color: var(--teal);
      box-shadow: 0 0 8px rgba(42,138,126,0.5);
      color: var(--cream);
    }

    .key.present {
      background: var(--amber);
      border-color: var(--amber);
      box-shadow: 0 0 8px rgba(232,151,26,0.5);
      color: #1a1208;
    }

    .key.absent {
      background: #141210;
      border-color: #141210;
      color: rgba(244,239,224,0.22);
    }

    /* ── Toast ── */
    .toast-wrap {
      position: fixed;
      top: 96px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      background: var(--cream);
      color: var(--charcoal);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 10px 22px;
      border-radius: 1px;
      white-space: nowrap;
      animation: toast-in 0.18s ease, toast-out 0.28s ease 1.8s forwards;
    }

    @keyframes toast-in  { from { opacity:0; transform:translateY(-6px) scale(0.95); } to { opacity:1; transform:none; } }
    @keyframes toast-out { from { opacity:1; } to { opacity:0; } }

    /* ── Help modal ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(7,6,10,0.88);
      z-index: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      padding: 16px;
    }

    .modal {
      background: #110F14;
      border: 1px solid rgba(244,239,224,0.1);
      padding: 36px 28px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      position: relative;
    }

    /* Glowing border accent */
    .modal::after {
      content: '';
      position: absolute;
      inset: -1px;
      border: 1px solid var(--amber);
      opacity: 0.18;
      pointer-events: none;
    }

    .modal-close {
      position: absolute;
      top: 12px; right: 14px;
      background: none;
      border: none;
      color: rgba(244,239,224,0.35);
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }
    .modal-close:hover { color: var(--coral); }

    .modal-tag {
      font-size: 8px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 8px;
    }

    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 40px;
      letter-spacing: 0.07em;
      line-height: 1;
      margin-bottom: 18px;
    }

    /* Example tiles in help */
    .help-example {
      display: flex;
      gap: 5px;
      justify-content: center;
      margin: 10px 0 4px;
    }

    .help-tile {
      width: 42px;
      height: 42px;
      border: 2px solid rgba(244,239,224,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--cream);
    }

    .help-tile.correct { background: var(--teal); border-color: var(--teal); box-shadow: 0 0 8px rgba(42,138,126,0.5); }
    .help-tile.present { background: var(--amber); border-color: var(--amber); box-shadow: 0 0 8px rgba(232,151,26,0.5); color:#1a1208; }
    .help-tile.absent  { background: #1B1916; border-color: #1B1916; color: rgba(244,239,224,0.3); }

    .help-desc {
      font-size: 9px;
      letter-spacing: 0.08em;
      color: rgba(244,239,224,0.45);
      line-height: 1.7;
      margin-bottom: 10px;
    }

    .help-rule {
      font-size: 9px;
      letter-spacing: 0.06em;
      color: rgba(244,239,224,0.3);
      border-top: 1px solid rgba(244,239,224,0.07);
      padding-top: 12px;
      margin-top: 4px;
      line-height: 1.8;
    }

    /* ── End modal extras ── */
    .modal-answer-word {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      letter-spacing: 0.14em;
      color: var(--teal);
      text-shadow: 0 0 20px rgba(42,138,126,0.5);
      margin-bottom: 6px;
    }

    .modal-answer-label {
      font-size: 8px;
      letter-spacing: 0.2em;
      color: rgba(244,239,224,0.35);
      text-transform: uppercase;
      margin-bottom: 22px;
    }

    .modal-stats {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-bottom: 20px;
    }

    .stat-n {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 40px;
      color: var(--amber);
      line-height: 1;
    }

    .stat-l {
      font-size: 8px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(244,239,224,0.35);
      margin-top: 3px;
    }

    .modal-share-grid {
      font-size: 20px;
      line-height: 1.5;
      letter-spacing: 3px;
      margin-bottom: 22px;
      font-family: monospace;
    }

    .btn-transmit {
      width: 100%;
      padding: 14px;
      background: var(--teal);
      border: none;
      color: var(--cream);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      margin-bottom: 12px;
    }

    .btn-transmit:hover {
      background: #33a99c;
      box-shadow: 0 0 18px rgba(42,138,126,0.45);
    }

    .modal-countdown {
      font-size: 8px;
      letter-spacing: 0.14em;
      color: rgba(244,239,224,0.22);
      text-transform: uppercase;
    }

    .modal-countdown b { color: var(--amber); }

    /* ── Win messages ── */
    .win-messages { display: none; }

    /* ── Responsive ── */
    @media (max-width: 360px) {
      .tile { width: 52px; height: 52px; font-size: 22px; }
      .key  { min-width: 33px; height: 48px; font-size: 11px; }
      .key.wide { min-width: 54px; }
    }
  </style>
</head>

<!-- ── Header ── -->

<!-- Toast container -->
<div class="toast-wrap" id="toasts"></div>

// ════════════════════════════════════════════════════════
//  DAILY WORD
// ════════════════════════════════════════════════════════
let ANSWER   = WORDS[Math.floor(Math.random() * WORDS.length)];
let PUZZLE_N = 1;

document.getElementById('puzzle-num').textContent = PUZZLE_N;
document.getElementById('date-label').textContent = `${WORDS.length} words in rotation`;

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let curRow    = 0;
let curCol    = 0;
let curGuess  = [];
let guesses   = [];   // [{letters, results}]
let gameOver  = false;
let revealing = false;
let letterState = {};  // best known state per letter


// ════════════════════════════════════════════════════════
//  BUILD GRID
// ════════════════════════════════════════════════════════
const gridEl = document.getElementById('grid');
for (let r = 0; r < 6; r++) {
  const row = document.createElement('div');
  row.className = 'row';
  row.id = `row-${r}`;
  for (let c = 0; c < 5; c++) {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.id = `tile-${r}-${c}`;
    row.appendChild(tile);
  }
  gridEl.appendChild(row);
}

// ════════════════════════════════════════════════════════
//  BUILD KEYBOARD
// ════════════════════════════════════════════════════════
const KB = ['QWERTYUIOP', 'ASDFGHJKL', '↵ZXCVBNM⌫'];
const kbEl = document.getElementById('keyboard');
KB.forEach(rowStr => {
  const row = document.createElement('div');
  row.className = 'kb-row';
  [...rowStr].forEach(ch => {
    const btn = document.createElement('button');
    const isWide = ch === '↵' || ch === '⌫';
    btn.className = 'key' + (isWide ? ' wide' : '');
    btn.textContent = ch === '↵' ? 'ENTER' : ch === '⌫' ? '⌫' : ch;
    btn.dataset.key = ch;
    btn.addEventListener('click', () => handleKey(ch));
    row.appendChild(btn);
  });
  kbEl.appendChild(row);
});

// ════════════════════════════════════════════════════════
//  KEYBOARD INPUT
// ════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const k = e.key.toUpperCase();
  if (k === 'ENTER')     return handleKey('↵');
  if (k === 'BACKSPACE') return handleKey('⌫');
  if (/^[A-Z]$/.test(k)) handleKey(k);
});

function handleKey(k) {
  if (gameOver || revealing) return;
  if      (k === '⌫') deleteLetter();
  else if (k === '↵') submitGuess();
  else if (/^[A-Z]$/.test(k) && curCol < 5) addLetter(k);
}

function addLetter(k) {
  const tile = document.getElementById(`tile-${curRow}-${curCol}`);
  tile.textContent = k;
  tile.classList.add('filled');
  curGuess.push(k);
  curCol++;
}

function deleteLetter() {
  if (curCol === 0) return;
  curCol--;
  const tile = document.getElementById(`tile-${curRow}-${curCol}`);
  tile.textContent = '';
  tile.classList.remove('filled');
  curGuess.pop();
}

// ════════════════════════════════════════════════════════
//  EVALUATE
// ════════════════════════════════════════════════════════
function evaluate(guess, answer) {
  const result   = Array(5).fill('absent');
  const ansPool  = {};
  for (let i = 0; i < 5; i++) {
    if (guess[i] === answer[i]) {
      result[i] = 'correct';
    } else {
      ansPool[answer[i]] = (ansPool[answer[i]] || 0) + 1;
    }
  }
  for (let i = 0; i < 5; i++) {
    if (result[i] === 'correct') continue;
    if (ansPool[guess[i]] > 0) {
      result[i] = 'present';
      ansPool[guess[i]]--;
    }
  }
  return result;
}

// ════════════════════════════════════════════════════════
//  SUBMIT GUESS
// ════════════════════════════════════════════════════════
function submitGuess() {
  if (curCol < 5) { toast('NOT ENOUGH LETTERS'); shakeRow(curRow); return; }
  const word = curGuess.join('');
  if (!DICT.has(word)) { toast('NOT IN WORD LIST'); shakeRow(curRow); return; }

  const results = evaluate(curGuess, ANSWER.split(''));
  guesses.push({ letters: [...curGuess], results });

  revealing = true;
  revealRow(curRow, results, () => {
    revealing = false;

    // Update letter states
    results.forEach((r, i) => {
      const l = curGuess[i];
      const p = letterState[l];
      if (!p || (p === 'absent' && r !== 'absent') || (p === 'present' && r === 'correct') || r === 'correct') {
        letterState[l] = r;
      }
    });
    updateKeyboard();

    const won  = results.every(r => r === 'correct');
    const lost = !won && curRow === 5;

    if (won) {
      gameOver = true;
      bounceRow(curRow);
      const msgs = ['SUPERNOVA MIND!','BRILLIANT!','IMPRESSIVE','GOOD SIGNAL','CLOSE CALL','BY THE STARS'];
      toast(msgs[curRow] || 'CORRECT!');
      setTimeout(() => showEndModal(true), 1400);
    } else if (lost) {
      gameOver = true;
      setTimeout(() => showEndModal(false), 500);
    } else {
      curRow++;
      curCol = 0;
      curGuess = [];
    }
  });
}

// ════════════════════════════════════════════════════════
//  ANIMATIONS
// ════════════════════════════════════════════════════════
function revealRow(rowIdx, results, onDone) {
  const tiles = [...document.querySelectorAll(`#row-${rowIdx} .tile`)];
  tiles.forEach((tile, i) => {
    setTimeout(() => {
      tile.classList.add('reveal');
      setTimeout(() => {
        tile.classList.remove('reveal');
        tile.classList.add(results[i]);
        if (i === 4 && onDone) onDone();
      }, 260);
    }, i * 320);
  });
}

function shakeRow(rowIdx) {
  const row = document.getElementById(`row-${rowIdx}`);
  row.classList.add('shake');
  row.addEventListener('animationend', () => row.classList.remove('shake'), { once: true });
}

function bounceRow(rowIdx) {
  [...document.querySelectorAll(`#row-${rowIdx} .tile`)].forEach((tile, i) => {
    setTimeout(() => {
      tile.classList.add('bounce');
      tile.addEventListener('animationend', () => tile.classList.remove('bounce'), { once: true });
    }, i * 110);
  });
}

function updateKeyboard() {
  document.querySelectorAll('.key[data-key]').forEach(btn => {
    const k = btn.dataset.key;
    if (!k || k === '⌫' || k === '↵') return;
    const s = letterState[k];
    if (!s) return;
    const wide = btn.classList.contains('wide');
    btn.className = `key${wide ? ' wide' : ''} ${s}`;
  });
}

// ════════════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════════════
function toast(msg) {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

//  SHARE GRID
// ════════════════════════════════════════════════════════
function buildShareGrid() {
  return guesses.map(g =>
    g.results.map(r => r === 'correct' ? '🟩' : r === 'present' ? '🟨' : '⬛').join('')
  ).join('\n');
}

// ════════════════════════════════════════════════════════
//  END MODAL
// ════════════════════════════════════════════════════════
function showEndModal(won) {
  const shareGrid  = buildShareGrid();
  const guessCount = won ? guesses.length : 'X';

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="modal-tag">${won ? '// MISSION COMPLETE //' : '// SIGNAL LOST //'}</div>
      <div class="modal-title" style="color:${won ? 'var(--teal)' : 'var(--coral)'};text-shadow:0 0 22px ${won ? 'rgba(42,138,126,0.45)' : 'rgba(217,79,43,0.45)'}">
        ${won ? 'MISSION<br>COMPLETE' : 'SIGNAL<br>LOST'}
      </div>
      <div class="modal-answer-word">${ANSWER}</div>
      <div class="modal-answer-label">${won ? 'The word' : 'The answer was'}</div>
      <div class="modal-stats">
        <div>
          <div class="stat-n">${guessCount}</div>
          <div class="stat-l">Guesses</div>
        </div>
        <div>
          <div class="stat-n">${PUZZLE_N}</div>
          <div class="stat-l">Round</div>
        </div>
      </div>
      <div class="modal-share-grid">${shareGrid}</div>
      <button class="btn-transmit" id="btn-again">↻ Play Again</button>
      <button class="btn-transmit" id="btn-share" style="margin-top:8px;background:transparent;border:1px solid rgba(244,239,224,0.15);color:rgba(244,239,224,0.5)">⊕ Share Results</button>
    </div>
  `;

  document.body.appendChild(overlay);

  document.getElementById('modal-close').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  document.getElementById('btn-again').addEventListener('click', () => {
    overlay.remove();
    resetGame();
  });

  document.getElementById('btn-share').addEventListener('click', () => {
    const text = `COSMLE Round ${PUZZLE_N}  ${guessCount}/6\n\n${shareGrid}\n\nzubinshourie.com`;
    navigator.clipboard.writeText(text)
      .then(() => toast('TRANSMITTED ✓'))
      .catch(() => toast('COPY FAILED'));
  });
}

// ════════════════════════════════════════════════════════
//  RESET / PLAY AGAIN
// ════════════════════════════════════════════════════════
function resetGame() {
  // Pick a new word (avoid repeating the last one)
  let newWord;
  do { newWord = WORDS[Math.floor(Math.random() * WORDS.length)]; } while (newWord === ANSWER);
  ANSWER = newWord;
  PUZZLE_N++;
  document.getElementById('puzzle-num').textContent = PUZZLE_N;

  // Reset state
  curRow = 0; curCol = 0; curGuess = [];
  guesses = []; letterState = {}; gameOver = false; revealing = false;

  // Clear grid tiles
  for (let r = 0; r < 6; r++) {
    for (let c = 0; c < 5; c++) {
      const tile = document.getElementById(`tile-${r}-${c}`);
      tile.textContent = '';
      tile.className = 'tile';
    }
  }

  // Reset keyboard
  document.querySelectorAll('.key[data-key]').forEach(btn => {
    const wide = btn.classList.contains('wide');
    btn.className = 'key' + (wide ? ' wide' : '');
  });
}

// ════════════════════════════════════════════════════════
//  STARFIELD
// ════════════════════════════════════════════════════════
(function () {
  const canvas = document.getElementById('stars');
  const ctx    = canvas.getContext('2d');
  let stars    = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({ length: 140 }, () => ({
      x:     Math.random() * canvas.width,
      y:     Math.random() * canvas.height,
      r:     Math.random() * 1.1 + 0.15,
      base:  Math.random() * 0.45 + 0.08,
      speed: Math.random() * 0.0015 + 0.0005,
      phase: Math.random() * Math.PI * 2,
      // occasional colored star
      hue: Math.random() < 0.12 ? (Math.random() < 0.5 ? 'amber' : 'teal') : 'white',
    }));
  }

  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const o = s.base * (0.55 + 0.45 * Math.sin(t * s.speed * 1000 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      if      (s.hue === 'amber') ctx.fillStyle = `rgba(232,151,26,${o})`;
      else if (s.hue === 'teal')  ctx.fillStyle = `rgba(42,138,126,${o})`;
      else                         ctx.fillStyle = `rgba(244,239,224,${o})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(draw);
})();
</script>
