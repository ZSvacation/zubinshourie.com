<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>OCTAGON — SPACE ARCADE</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0D0B08;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Space Mono', monospace;
  overflow: hidden;
  touch-action: none;
}

#wrap {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

canvas {
  display: block;
}

#back-link {
  position: absolute;
  top: -34px; left: 0;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: rgba(245,240,232,0.35);
  text-decoration: none;
  transition: color 0.2s;
}
#back-link:hover { color: #E8971A; }

#hint {
  margin-top: 10px;
  font-size: 9px;
  letter-spacing: 0.18em;
  color: rgba(245,240,232,0.22);
  text-align: center;
}
</style>
</head>
<body>
<div id="wrap">
  <a id="back-link" href="index.html">← BACK TO BASE</a>
  <canvas id="game"></canvas>
  <div id="hint">← → ARROW KEYS &nbsp;|&nbsp; A D &nbsp;|&nbsp; TOUCH SIDES</div>
</div>

<script>
// ─── CANVAS ─────────────────────────────────────────────────
const C   = document.getElementById('game');
const ctx = C.getContext('2d');
const SZ  = Math.min(window.innerWidth, window.innerHeight, 560);
C.width   = SZ;
C.height  = SZ;
const CX  = SZ / 2, CY = SZ / 2;

// ─── PALETTE ────────────────────────────────────────────────
const BG      = '#0D0B08';
const CREAM   = '#F5F0E8';
const CORAL   = '#D94F2B';
const AMBER   = '#E8971A';
const TEAL    = '#2A8A7E';
const PURPLE  = '#5C3F7A';

// ─── CONFIG ──────────────────────────────────────────────────
const SIDES     = 8;           // octagon
const PLAYER_R  = SZ * 0.085; // orbit radius
const PLAYER_SZ = SZ * 0.028; // player triangle size
const WALL_W    = SZ * 0.022; // wall thickness
const MIN_GAP   = (2 * Math.PI / SIDES) * 0.72;  // gap arc width (fits player + margin)
const INNER_R   = SZ * 0.055; // central dead zone radius

// Level speed config
const BASE_SPIN_SPD  = 0.38;  // rad/sec world rotation
const BASE_WALL_SPD  = SZ * 0.095; // px/sec walls closing
const SPEED_INC      = 0.012; // per second of survival

// Colors per difficulty band
const WALL_COLORS = [C_TEAL, C_AMBER, C_CORAL, C_PURPLE].map ? null : null;
// (defined inline below)

// ─── STATE ──────────────────────────────────────────────────
let STATE     = 'start'; // 'start' | 'playing' | 'dead'
let playerAngle = Math.PI / 2; // angle on the ring (0 = right)
let spinAngle   = 0;           // world rotation offset
let spinDir     = 1;           // +1 or -1
let walls       = [];          // active wall rings
let score       = 0;           // tenths of a second survived
let hiScore     = 0;
let gameTime    = 0;           // seconds survived
let lastTS      = 0;
let stars       = [];
let shakeAmt    = 0;
let deadAlpha   = 0;
let bgHue       = 0;           // slow bg color shift
let inputLeft   = false;
let inputRight  = false;
let WALL_COLORS_ARR = [TEAL, AMBER, CORAL, PURPLE, CREAM];
let colorIdx    = 0;
let flashTimer  = 0;

// ─── STARS ──────────────────────────────────────────────────
function initStars() {
  stars = [];
  for (let i = 0; i < 90; i++) {
    stars.push({
      x: Math.random() * SZ,
      y: Math.random() * SZ,
      r: Math.random() * 1.2 + 0.2,
      phase: Math.random() * Math.PI * 2,
      col: Math.random() < 0.07 ? AMBER
         : Math.random() < 0.10 ? TEAL : CREAM,
    });
  }
}

// ─── WALL GENERATION ─────────────────────────────────────────
function spawnWall(r) {
  // Pick a gap position — avoid the player's sector when starting
  const gapSector = Math.floor(Math.random() * SIDES);
  const gapStart  = (gapSector / SIDES) * Math.PI * 2;
  const gapEnd    = gapStart + MIN_GAP;

  colorIdx = (colorIdx + 1) % WALL_COLORS_ARR.length;

  walls.push({
    r,           // current radius (shrinks toward center)
    gapStart,    // gap arc start (in world space, ignores spinAngle)
    gapEnd,      // gap arc end
    col: WALL_COLORS_ARR[colorIdx],
  });
}

function wallSpeed() {
  return BASE_WALL_SPD + gameTime * SPEED_INC * SZ;
}

function spinSpeed() {
  return (BASE_SPIN_SPD + gameTime * 0.006) * spinDir;
}

// ─── UPDATE ──────────────────────────────────────────────────
function initGame() {
  walls       = [];
  score       = 0;
  gameTime    = 0;
  playerAngle = Math.PI / 2;
  spinAngle   = 0;
  spinDir     = Math.random() < 0.5 ? 1 : -1;
  colorIdx    = 0;
  deadAlpha   = 0;
  shakeAmt    = 0;
  flashTimer  = 0;

  // First wall spawns at edge
  spawnWall(SZ * 0.55);
  STATE = 'playing';
}

function update(dt) {
  gameTime += dt;
  score     = Math.floor(gameTime * 10);
  if (score > hiScore) hiScore = score;

  // Rotate world
  spinAngle += spinSpeed() * dt;
  // Occasionally flip spin direction
  if (Math.random() < dt * 0.08) spinDir *= -1;

  // Player rotation (input)
  const turnSpd = (2.8 + gameTime * 0.03) * Math.PI;
  if (inputLeft)  playerAngle -= turnSpd * dt;
  if (inputRight) playerAngle += turnSpd * dt;
  playerAngle = ((playerAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);

  // Move walls inward
  const spd = wallSpeed();
  for (let i = walls.length - 1; i >= 0; i--) {
    walls[i].r -= spd * dt;
    if (walls[i].r < INNER_R - WALL_W) walls.splice(i, 1);
  }

  // Spawn new wall when frontmost is at ~60% of screen
  const outermost = walls.reduce((mx, w) => Math.max(mx, w.r), 0);
  if (outermost < SZ * 0.42) {
    // Smarter gap placement: pick gap sector closest to player
    spawnWallSmart();
  }

  // Collision
  checkCollision();

  shakeAmt *= 0.8;
  bgHue     = (bgHue + dt * 8) % 360;
  flashTimer = Math.max(0, flashTimer - dt);
}

function spawnWallSmart() {
  // Gap starts at a random sector (not the one directly behind player)
  const playerSector = Math.floor(
    (((playerAngle - spinAngle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2))
    / (Math.PI * 2) * SIDES
  );

  // Give gap in a sector within reach of player (adjacent sector or player sector)
  let gapSector;
  const r = Math.random();
  if (r < 0.45) {
    gapSector = playerSector;
  } else if (r < 0.72) {
    gapSector = (playerSector + 1) % SIDES;
  } else if (r < 0.92) {
    gapSector = ((playerSector - 1) + SIDES) % SIDES;
  } else {
    gapSector = Math.floor(Math.random() * SIDES);
  }

  const gapStart = (gapSector / SIDES) * Math.PI * 2;
  const gapEnd   = gapStart + MIN_GAP;

  colorIdx = (colorIdx + 1) % WALL_COLORS_ARR.length;
  walls.push({
    r: SZ * 0.56,
    gapStart,
    gapEnd,
    col: WALL_COLORS_ARR[colorIdx],
  });
}

function checkCollision() {
  // Player position in world space
  const worldAngle = ((playerAngle - spinAngle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);

  for (const w of walls) {
    if (Math.abs(w.r - PLAYER_R) > WALL_W + 4) continue; // not at player radius

    // Is player in the gap?
    let gs = ((w.gapStart % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
    let ge = gs + MIN_GAP;

    // Normalize worldAngle into gap check
    let wa = worldAngle;
    if (wa < gs - 0.1) wa += Math.PI * 2;

    const inGap = wa >= gs - 0.02 && wa <= ge + 0.02;
    if (!inGap) {
      killPlayer();
      return;
    }
  }
}

function killPlayer() {
  if (STATE !== 'playing') return;
  STATE     = 'dead';
  shakeAmt  = 18;
  deadAlpha = 0;
  flashTimer = 0.5;
}

// ─── DRAW ─────────────────────────────────────────────────────
function draw(ts) {
  ctx.save();
  if (shakeAmt > 0.5) {
    ctx.translate(
      (Math.random() - 0.5) * shakeAmt * 2.5,
      (Math.random() - 0.5) * shakeAmt * 2.5
    );
  }

  // Clear
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, SZ, SZ);

  // Stars
  drawStars(ts);

  if (STATE !== 'start') {
    // Rotating world context
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(spinAngle);

    drawOctagonBg();
    drawWalls();

    ctx.restore();

    // Player (in screen space, orbiting)
    drawPlayer(ts);

    // Score
    drawHUD();
  }

  ctx.restore();

  // CRT lines
  drawCRT();

  // Overlays
  if (STATE === 'start') drawStartScreen(ts);
  if (STATE === 'dead')  drawDeadScreen(ts);
}

function drawStars(ts) {
  for (const s of stars) {
    const a = 0.3 + 0.7 * Math.sin(ts / 900 + s.phase);
    ctx.globalAlpha = a;
    ctx.fillStyle   = s.col;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function octPts(r) {
  const pts = [];
  for (let i = 0; i < SIDES; i++) {
    const a = (i / SIDES) * Math.PI * 2 - Math.PI / 2;
    pts.push([Math.cos(a) * r, Math.sin(a) * r]);
  }
  return pts;
}

function drawOctagonBg() {
  // Faint concentric octagons as depth guides
  for (let rr = SZ * 0.08; rr < SZ * 0.6; rr += SZ * 0.065) {
    const pts = octPts(rr);
    ctx.beginPath();
    pts.forEach(([x, y], i) => i ? ctx.lineTo(x, y) : ctx.moveTo(x, y));
    ctx.closePath();
    ctx.strokeStyle = 'rgba(245,240,232,0.04)';
    ctx.lineWidth   = 0.8;
    ctx.stroke();
  }

  // Radial lines from center to each vertex
  for (let i = 0; i < SIDES; i++) {
    const a = (i / SIDES) * Math.PI * 2 - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(a) * SZ * 0.52, Math.sin(a) * SZ * 0.52);
    ctx.strokeStyle = 'rgba(245,240,232,0.03)';
    ctx.lineWidth   = 0.6;
    ctx.stroke();
  }

  // Inner solid octagon (center)
  const ipts = octPts(INNER_R);
  ctx.beginPath();
  ipts.forEach(([x, y], i) => i ? ctx.lineTo(x, y) : ctx.moveTo(x, y));
  ctx.closePath();
  ctx.fillStyle = '#0A0804';
  ctx.fill();
  ctx.strokeStyle = 'rgba(245,240,232,0.12)';
  ctx.lineWidth   = 1;
  ctx.stroke();
}

function drawWalls() {
  for (const w of walls) {
    drawWallRing(w);
  }
}

function drawWallRing(w) {
  const r  = w.r;
  const gs = w.gapStart;
  const ge = w.gapEnd;

  ctx.strokeStyle = w.col;
  ctx.lineWidth   = WALL_W;
  ctx.shadowColor = w.col;
  ctx.shadowBlur  = WALL_W * 1.8;

  // Draw the octagon ring as 8 arcs/segments, skipping the gap
  // We represent the octagon wall as 8 line segments along the octagon perimeter
  // Each segment spans from vertex i to vertex i+1
  const segAngle = (Math.PI * 2) / SIDES;

  for (let i = 0; i < SIDES; i++) {
    const segStart = (i / SIDES) * Math.PI * 2;
    const segEnd   = ((i + 1) / SIDES) * Math.PI * 2;

    // Check if this segment overlaps with the gap
    if (segOverlapsGap(segStart, segEnd, gs, ge)) continue;

    // Draw segment from vertex i to vertex i+1
    const ax = Math.cos(segStart - Math.PI / 2) * r;
    const ay = Math.sin(segStart - Math.PI / 2) * r;
    const bx = Math.cos(segEnd - Math.PI / 2) * r;
    const by = Math.sin(segEnd - Math.PI / 2) * r;

    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.stroke();
  }

  ctx.shadowBlur = 0;
}

function segOverlapsGap(segStart, segEnd, gapStart, gapEnd) {
  // Normalize all angles to [0, 2π)
  const norm = a => ((a % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  const ss = norm(segStart);
  const se = norm(segEnd);
  const gs = norm(gapStart);
  const ge = norm(gapEnd);

  // Segment midpoint check (simpler, good enough for octagon segments)
  const mid = norm((ss + se) / 2 + (se < ss ? Math.PI : 0));
  // Actually: check if segment center falls in gap
  const smid = norm(segStart + (Math.PI * 2) / SIDES / 2);

  if (ge > gs) {
    return smid >= gs - 0.05 && smid <= ge + 0.05;
  } else {
    // Gap wraps around 2π
    return smid >= gs - 0.05 || smid <= ge + 0.05;
  }
}

function drawPlayer(ts) {
  const px = CX + Math.cos(playerAngle) * PLAYER_R;
  const py = CY + Math.sin(playerAngle) * PLAYER_R;

  // Rotation: triangle points inward
  const angle = playerAngle + Math.PI; // face center

  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(angle);

  const sz = PLAYER_SZ;

  // Glow
  ctx.shadowColor = STATE === 'dead' && flashTimer > 0 ? CORAL : TEAL;
  ctx.shadowBlur  = sz * 2.5;

  // Triangle
  ctx.beginPath();
  ctx.moveTo(0, -sz * 1.1);        // tip (inward)
  ctx.lineTo(-sz * 0.85, sz * 0.9); // left
  ctx.lineTo(sz * 0.85, sz * 0.9);  // right
  ctx.closePath();

  ctx.fillStyle = STATE === 'dead' && flashTimer > 0 ? CORAL : CREAM;
  ctx.fill();

  // Inner accent
  ctx.beginPath();
  ctx.moveTo(0, -sz * 0.55);
  ctx.lineTo(-sz * 0.42, sz * 0.45);
  ctx.lineTo(sz * 0.42, sz * 0.45);
  ctx.closePath();
  ctx.fillStyle = STATE === 'dead' && flashTimer > 0 ? AMBER : TEAL;
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawHUD() {
  ctx.textAlign    = 'center';
  ctx.font         = `bold ${SZ * 0.046}px "Space Mono"`;
  ctx.fillStyle    = 'rgba(245,240,232,0.8)';
  ctx.fillText(formatTime(gameTime), CX, CY - INNER_R - SZ * 0.038);

  ctx.font      = `${SZ * 0.022}px "Space Mono"`;
  ctx.fillStyle = 'rgba(245,240,232,0.25)';
  ctx.fillText(`BEST ${formatTime(hiScore / 10)}`, CX, CY + INNER_R + SZ * 0.055);
}

function formatTime(s) {
  const m  = Math.floor(s / 60);
  const ss = (s % 60).toFixed(1).padStart(4, '0');
  return m > 0 ? `${m}:${ss}` : `${ss}s`;
}

function drawCRT() {
  for (let y = 0; y < SZ; y += 2) {
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(0, y, SZ, 1);
  }
  const vig = ctx.createRadialGradient(CX, CY, SZ * 0.25, CX, CY, SZ * 0.7);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, SZ, SZ);
}

// ─── SCREENS ─────────────────────────────────────────────────
function drawStartScreen(ts) {
  ctx.fillStyle = 'rgba(13,11,8,0.88)';
  ctx.fillRect(0, 0, SZ, SZ);

  // Animated octagon outline
  ctx.save();
  ctx.translate(CX, CY);
  ctx.rotate(ts / 3000);
  const rot  = (ts / 3000) % (Math.PI * 2);
  const pts  = octPts(SZ * 0.28);
  ctx.beginPath();
  pts.forEach(([x, y], i) => i ? ctx.lineTo(x, y) : ctx.moveTo(x, y));
  ctx.closePath();
  ctx.strokeStyle = AMBER;
  ctx.lineWidth   = 1.5;
  ctx.globalAlpha = 0.25;
  ctx.stroke();

  ctx.rotate(-ts / 2000);
  const pts2 = octPts(SZ * 0.16);
  ctx.beginPath();
  pts2.forEach(([x, y], i) => i ? ctx.lineTo(x, y) : ctx.moveTo(x, y));
  ctx.closePath();
  ctx.strokeStyle = TEAL;
  ctx.lineWidth   = 1;
  ctx.globalAlpha = 0.35;
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.restore();

  // Title
  const titleY = SZ * 0.3;
  ctx.textAlign  = 'center';
  ctx.fillStyle  = AMBER;
  ctx.font       = `bold ${SZ * 0.096}px "Space Mono"`;
  ctx.fillText('OCT', CX, titleY);
  ctx.fillStyle = CREAM;
  ctx.fillText('AGON', CX, titleY + SZ * 0.096);

  ctx.fillStyle  = 'rgba(245,240,232,0.3)';
  ctx.font       = `${SZ * 0.025}px "Space Mono"`;
  ctx.fillText('S P A C E  R E A C T I O N', CX, titleY + SZ * 0.14);

  // Rules
  ctx.fillStyle = 'rgba(245,240,232,0.35)';
  ctx.font      = `${SZ * 0.024}px "Space Mono"`;
  ctx.fillText('walls collapse inward', CX, SZ * 0.6);
  ctx.fillText('rotate through the gap', CX, SZ * 0.63);

  const blink = Math.floor(ts / 550) % 2;
  if (blink) {
    ctx.fillStyle = TEAL;
    ctx.font      = `${SZ * 0.028}px "Space Mono"`;
    ctx.fillText('[ ANY KEY / TAP ]', CX, SZ * 0.74);
  }
}

function drawDeadScreen(ts) {
  deadAlpha = Math.min(1, deadAlpha + 0.03);
  if (deadAlpha <= 0) return;

  ctx.globalAlpha = deadAlpha;
  ctx.fillStyle   = 'rgba(13,11,8,0.82)';
  ctx.fillRect(0, 0, SZ, SZ);

  ctx.textAlign  = 'center';
  ctx.fillStyle  = CORAL;
  ctx.font       = `bold ${SZ * 0.072}px "Space Mono"`;
  ctx.fillText('OBLITERATED', CX, SZ * 0.3);

  ctx.fillStyle = 'rgba(245,240,232,0.35)';
  ctx.font      = `${SZ * 0.024}px "Space Mono"`;
  ctx.fillText('REACTION TOO SLOW', CX, SZ * 0.37);

  ctx.fillStyle = CREAM;
  ctx.font      = `bold ${SZ * 0.065}px "Space Mono"`;
  ctx.fillText(formatTime(gameTime), CX, SZ * 0.5);
  ctx.fillStyle = 'rgba(245,240,232,0.4)';
  ctx.font      = `${SZ * 0.022}px "Space Mono"`;
  ctx.fillText('SURVIVED', CX, SZ * 0.565);

  if (hiScore > 0) {
    ctx.fillStyle = 'rgba(245,240,232,0.25)';
    ctx.font      = `${SZ * 0.02}px "Space Mono"`;
    ctx.fillText(`BEST  ${formatTime(hiScore / 10)}`, CX, SZ * 0.62);
  }

  const newRecord = score >= hiScore && score > 0;
  if (newRecord) {
    ctx.fillStyle = AMBER;
    ctx.font      = `${SZ * 0.024}px "Space Mono"`;
    ctx.fillText('★  NEW RECORD  ★', CX, SZ * 0.65);
  }

  const blink = Math.floor(ts / 500) % 2;
  if (blink) {
    ctx.fillStyle = TEAL;
    ctx.font      = `${SZ * 0.026}px "Space Mono"`;
    ctx.fillText('[ R ] TRY AGAIN', CX, SZ * 0.78);
  }

  ctx.globalAlpha = 1;
}

// ─── GAME LOOP ────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - lastTS) / 1000, 0.05);
  lastTS   = ts;

  if (STATE === 'playing') update(dt);
  else if (STATE === 'dead') {
    deadAlpha = Math.min(1, deadAlpha + dt * 2.0);
    shakeAmt *= 0.8;
    flashTimer = Math.max(0, flashTimer - dt);
  }

  draw(ts);
  requestAnimationFrame(loop);
}

// ─── INPUT ────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (STATE === 'start') { initGame(); return; }
  if (STATE === 'dead' && (e.key === 'r' || e.key === 'R')) { initGame(); return; }
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') { inputLeft  = true; e.preventDefault(); }
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { inputRight = true; e.preventDefault(); }
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') inputLeft  = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') inputRight = false;
});

// Touch: left half = left, right half = right
C.addEventListener('touchstart', e => {
  e.preventDefault();
  if (STATE === 'start')                    { initGame(); return; }
  if (STATE === 'dead' && deadAlpha > 0.3)  { initGame(); return; }
  for (const t of e.touches) {
    if (t.clientX < C.getBoundingClientRect().left + SZ / 2) inputLeft  = true;
    else                                                       inputRight = true;
  }
}, { passive: false });

C.addEventListener('touchend', e => {
  e.preventDefault();
  inputLeft  = false;
  inputRight = false;
}, { passive: false });

C.addEventListener('touchmove', e => {
  e.preventDefault();
  inputLeft  = false;
  inputRight = false;
  for (const t of e.touches) {
    if (t.clientX < C.getBoundingClientRect().left + SZ / 2) inputLeft  = true;
    else                                                       inputRight = true;
  }
}, { passive: false });

// ─── BOOT ─────────────────────────────────────────────────────
initStars();
requestAnimationFrame(ts => { lastTS = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
